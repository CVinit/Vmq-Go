name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Docker image:

          ghcr.io/cvinit/vmq-go:$TAG_NAME
          EOF
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            --notes-file "$notes_file"
